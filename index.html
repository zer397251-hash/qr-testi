<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VR Ticket Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

video{
width:95%;
max-width:500px;
border-radius:10px;
margin-top:10px;
}

#result{
margin-top:20px;
padding:15px;
background:#222;
border-radius:10px;
text-align:left;
white-space:pre-wrap;
font-size:14px;
}

</style>

</head>

<body>

<h1>🚆 VR Ticket Scanner</h1>

<video id="video"></video>

<div id="result">
Waiting for ticket scan...
</div>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById("video")
const resultBox = document.getElementById("result")

function decodeTicket(bytes){

let b = new Uint8Array(bytes)

// coach + seat
let b33 = b[33]
let b34 = b[34]

let val = (b33 << 2) | (b34 >> 6)

let coach = val >> 7
let seat = val & 0x7F

// yläkerran paikat
if((b[32] & 0x80) !== 0){
seat += 100
}

// junanumero
let trainByte = b[7]
let trainFlag = b[6]

let trainNumber = trainByte

if(trainFlag === 0x08){
trainNumber = trainByte + 8
}

// route
let route = (b[20] << 8) | b[21]

return `
🚆 Train guess: ${trainNumber}

🚃 Coach: ${coach}

💺 Seat: ${seat}

🛤 Route ID: ${route}

📦 Payload length: ${b.length} bytes

--- DEBUG ---

byte6: ${b[6]}
byte7: ${b[7]}
byte16: ${b[16]}
byte17: ${b[17]}
byte31: ${b[31]}
byte32: ${b[32]}
byte33: ${b[33]}
byte34: ${b[34]}
`
}

codeReader.decodeFromVideoDevice(null, video, (result, err) => {

if(result){

let raw = result.getRawBytes()

if(!raw){
resultBox.innerText = "No raw payload found"
return
}

let decoded = decodeTicket(raw)

resultBox.innerText = decoded

}

})

</script>

</body>
</html>
