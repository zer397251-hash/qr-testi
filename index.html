<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VR Ticket Analyzer</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

video{
width:420px;
border-radius:10px;
border:3px solid #333;
}

#result{
margin-top:20px;
width:800px;
margin-left:auto;
margin-right:auto;
background:#1a1a1a;
padding:20px;
border-radius:10px;
text-align:left;
}

pre{
white-space:pre-wrap;
}

</style>
</head>

<body>

<h1>VR Ticket Analyzer</h1>

<video id="video"></video>

<div id="result">
Waiting for scan...
</div>

<script>

const reader = new ZXing.BrowserAztecCodeReader()

const resultBox=document.getElementById("result")

function hexDump(bytes){

let out=""

for(let i=0;i<bytes.length;i++){

let hex=bytes[i].toString(16).padStart(2,"0")

out+=i.toString().padStart(3,"0")+" : 0x"+hex+"\n"

}

return out

}

function analyze(bytes){

let coach=bytes[21]
let seat=bytes[22]
let train=bytes[23]

let origin=(bytes[26]<<8)|bytes[27]
let dest=(bytes[28]<<8)|bytes[29]

let seatField=(coach<<8)|seat

return `

Train byte: ${train}

Coach raw: ${coach}

Seat raw: ${seat}

Seat field: ${seatField}

Origin ID: ${origin}

Destination ID: ${dest}

`

}

reader.decodeFromVideoDevice(null,'video',(result,err)=>{

if(result){

let bytes=result.getRawBytes()

if(!bytes){

resultBox.innerHTML="Scanner returned text only — try different ZXing build"
return

}

let info=analyze(bytes)

resultBox.innerHTML=

"<h2>Decoded fields</h2><pre>"+info+"</pre>"+
"<h2>Byte dump</h2><pre>"+hexDump(bytes)+"</pre>"

}

})

</script>

</body>
</html>
