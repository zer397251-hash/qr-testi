<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VR Ticket Analyzer</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

video{
width:420px;
border-radius:10px;
border:3px solid #333;
}

#result{
margin-top:20px;
width:800px;
margin-left:auto;
margin-right:auto;
background:#1a1a1a;
padding:20px;
border-radius:10px;
text-align:left;
}

pre{
white-space:pre-wrap;
word-break:break-all;
}

.section{
margin-bottom:20px;
}

</style>
</head>

<body>

<h1>VR Ticket Analyzer</h1>

<video id="video"></video>

<div id="result">
Waiting for scan...
</div>

<script>

const reader = new ZXing.BrowserMultiFormatReader()

const resultBox = document.getElementById("result")

function stringToBytes(str){

const encoder = new TextEncoder()
return encoder.encode(str)

}

function hexDump(bytes){

let out=""

for(let i=0;i<bytes.length;i++){

let hex = bytes[i].toString(16).padStart(2,"0")

out += i.toString().padStart(3,"0")+" : 0x"+hex+"\n"

}

return out

}

function decodeTrain(code){

const map={
0x48:"IC",
0x49:"IC",
0x4A:"IC",
0x44:"Regional?",
0x45:"Regional?"
}

return map[code] || "Unknown"

}

function analyze(bytes){

let coach=bytes[21]
let seat=bytes[22]
let train=bytes[23]

let origin=(bytes[26]<<8)|bytes[27]
let dest=(bytes[28]<<8)|bytes[29]

let seatField=(coach<<8)|seat

let seatGuess="unknown"

if(seat===100) seatGuess="≈67 (possible mapping)"
if(seat===36) seatGuess="≈16/48 (seen in dataset)"
if(seat===228) seatGuess="≈67/15"

return `

🚆 Train code
${train}  (${decodeTrain(train)})

🚃 Coach (raw)
${coach}

💺 Seat encoded
${seat}

Seat field
${seatField}

Seat guess
${seatGuess}

📍 Origin station id
${origin}

📍 Destination id
${dest}

`

}

reader.decodeFromVideoDevice(null,'video',(result,err)=>{

if(result){

let raw=result.text

let bytes=stringToBytes(raw)

let analysis=analyze(bytes)

resultBox.innerHTML=`

<div class="section">

<h2>Decoded fields</h2>

<pre>${analysis}</pre>

</div>

<div class="section">

<h2>Raw text payload</h2>

<pre>${raw}</pre>

</div>

<div class="section">

<h2>Byte dump</h2>

<pre>${hexDump(bytes)}</pre>

</div>

`

}

})

</script>

</body>
</html>
