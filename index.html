<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Ticket Test Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

video{
width:95%;
max-width:500px;
border-radius:10px;
margin-top:10px;
}

#result{
margin-top:20px;
padding:10px;
background:#222;
border-radius:10px;
text-align:left;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>VR Ticket Scanner (Test)</h2>

<video id="video"></video>

<div id="result">Scan a ticket...</div>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById("video")
const resultBox = document.getElementById("result")

function decodeTicket(bytes){

let b = new Uint8Array(bytes)

let b33 = b[33]
let b34 = b[34]

let val = (b33 << 2) | (b34 >> 6)

let coach = val >> 7
let seat = val & 0x7F

let trainType = b[6]
let trainByte = b[7]

let train = trainType == 8 ? trainType + trainByte : trainByte + 50

let station = b[38]

let route = (b[20] << 8) | b[21]

return `
🚆 Train: IC ${train}

🚃 Coach: ${coach}

💺 Seat: ${seat}

🛤 Route ID: ${route}

📍 Station code: ${station}

Raw payload length: ${b.length} bytes
`
}

codeReader.decodeFromVideoDevice(null, video, (result, err) => {

if(result){

let raw = result.getRawBytes()

if(!raw){
resultBox.innerText = "No raw bytes available"
return
}

let decoded = decodeTicket(raw)

resultBox.innerText = decoded
}

})

</script>

</body>
</html>
